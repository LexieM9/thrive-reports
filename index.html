<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thrive Performance — Session Report Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#1a1a1a;min-height:100vh}
.wrap{max-width:700px;margin:0 auto;padding:1.5rem 1rem}
input,select,textarea{font-family:inherit;font-size:13px;padding:8px 11px;border:1px solid #ddd;border-radius:8px;width:100%;color:#1a1a1a;background:#fff;outline:none}
input:focus,select:focus,textarea:focus{border-color:#003DA5;box-shadow:0 0 0 3px #003DA520}
textarea{resize:vertical;line-height:1.6}
button{font-family:inherit;font-size:13px;padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;transition:background .15s}
button:hover{background:#f0f0f0}
.btn-p{background:#003DA5;color:#fff;border-color:#003DA5}
.btn-p:hover{background:#002D7A}
label{display:block;font-size:12px;color:#666;margin-bottom:4px;font-weight:500}
.card{background:#fff;border:1px solid #e8e8e8;border-radius:12px;padding:1.25rem;margin-bottom:16px}
.sec-title{font-size:11px;font-weight:600;color:#003DA5;text-transform:uppercase;letter-spacing:.07em;margin-bottom:14px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px}
table{width:100%;border-collapse:collapse}
th{font-size:11px;font-weight:600;padding:8px 10px;letter-spacing:.04em;text-align:left;white-space:nowrap;background:#003DA5;color:#fff}
th.c,td.c{text-align:center}
td{font-size:13px;padding:8px 10px;border-bottom:1px solid #f0f0f0}
tr:last-child td{border-bottom:none}
td.pos{color:#1a7a3b;font-weight:600;text-align:center}
td.neg{color:#b83232;font-weight:600;text-align:center}
td.neu{color:#999;text-align:center}
.badge{display:inline-block;font-size:11px;font-weight:500;padding:4px 10px;border-radius:6px;background:#eef3fc;color:#003DA5}
.progress{display:flex;gap:4px;margin-bottom:24px}
.prog-item{flex:1;text-align:center}
.prog-bar{height:3px;border-radius:2px;margin-bottom:5px;transition:background .25s}
.prog-label{font-size:10px;font-weight:500}
.file-label{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;color:#1a1a1a}
.file-label:hover{background:#f5f5f5}
.summary-box{background:#f7f9ff;border:1px solid #ccd7f0;border-radius:12px;padding:1.25rem;margin-bottom:20px}
.tbl-wrap{overflow-x:auto;margin-bottom:24px}
.meta-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:10px}
.chip{background:#eef3fc;border-radius:8px;padding:5px 12px;text-align:center}
.chip-label{font-size:10px;color:#003DA5;text-transform:uppercase;letter-spacing:.05em;display:block}
.chip-val{font-size:12px;font-weight:600;color:#1a1a1a}
.nav{display:flex;margin-top:24px}
.nav.spread{justify-content:space-between}
.nav.right{justify-content:flex-end}
@media print{
  .no-print{display:none!important}
  body{background:#fff}
  .card,.summary-box{box-shadow:none;border:1px solid #ddd}
}
@media(max-width:500px){.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="no-print" style="display:flex;align-items:center;gap:10px;margin-bottom:20px">
    <div style="width:34px;height:34px;border-radius:8px;background:#003DA5;display:flex;align-items:center;justify-content:center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0 1 12 4.5v15a2.5 2.5 0 0 1-4.96-.44l-1.02-5.1A2.5 2.5 0 0 1 7.5 11H3a2.5 2.5 0 0 1 0-5h4.5A2.5 2.5 0 0 1 9.5 2z"/><path d="M14.5 2A2.5 2.5 0 0 0 12 4.5v15a2.5 2.5 0 0 0 4.96-.44l1.02-5.1A2.5 2.5 0 0 0 16.5 11H21a2.5 2.5 0 0 0 0-5h-4.5A2.5 2.5 0 0 0 14.5 2z"/></svg>
    </div>
    <div>
      <div style="font-size:15px;font-weight:600;color:#1a1a1a">Thrive Performance</div>
      <div style="font-size:11px;color:#888">Session Report Generator</div>
    </div>
  </div>
  <div id="app"></div>
</div>

<script>
const B='#003DA5';
const STEPS=['Setup','Pre Putting','Mind Training','Post + Focus Golf','Report'];
const PUT_KEYS=[
  {k:'score',l:'Total Score',u:'/100'},
  {k:'faceChange',l:'Face Change',u:'%'},
  {k:'track',l:'Track',u:'%'},
  {k:'consistency',l:'Consistency',u:'%'},
  {k:'tempo',l:'Tempo',u:'%'},
  {k:'rotation',l:'Rotation',u:'%'},
  {k:'trembling',l:'Trembling',u:'%'},
  {k:'handling',l:'Handling',u:'%'},
];
const MIND_KEYS=[
  {k:'earnedRR',l:'Earned Reward Rate',u:'%'},
  {k:'avgReward',l:'Avg Reward Duration',u:'s'},
  {k:'longest',l:'Longest Reward',u:'s'},
  {k:'peakCalm',l:'Peak Calm Focus',u:''},
  {k:'focusPct',l:'Focus %',u:'%'},
  {k:'calmPct',l:'Calm %',u:'%'},
  {k:'resistStress',l:'Resist Stress',u:'%'},
  {k:'resistFatigue',l:'Resist Fatigue',u:'%'},
];
const FG_KEYS=[
  {k:'earnedRR',l:'Earned Reward Rate',u:'%'},
  {k:'avgReward',l:'Avg Reward Duration',u:'s'},
  {k:'longest',l:'Longest Reward',u:'s'},
  {k:'peakCalm',l:'Peak Calm Focus',u:''},
];

const emptyObj=keys=>Object.fromEntries(keys.map(({k})=>[k,'']));
let S={
  step:0,summary:'',prevSession:null,
  d:{
    sessionNum:'1',date:new Date().toISOString().split('T')[0],
    athlete:'',trainer:'',putterType:'Blade',handed:'Right',
    puttLen:'',puttUnit:'ft',surface:'Indoor',green:'Artificial',goal:'',
    pre:emptyObj(PUT_KEYS),mind:emptyObj(MIND_KEYS),
    post:emptyObj(PUT_KEYS),fg:emptyObj(FG_KEYS)
  }
};

function set(path,val){
  const p=path.split('.');
  if(p.length===1)S.d[p[0]]=val;
  else S.d[p[0]][p[1]]=val;
  render();
}
function setSt(k,v){S[k]=v;render();}

function delta(a,b){
  const x=parseFloat(a),y=parseFloat(b);
  if(isNaN(x)||isNaN(y))return null;
  return parseFloat((x-y).toFixed(1));
}
function dCell(a,b){
  const d=delta(a,b);
  if(d===null)return'<td class="neu">—</td>';
  return`<td class="${d>0?'pos':d<0?'neg':'neu'}">${d>0?'+':''}${d}</td>`;
}

function numGrid(keys,sec){
  return`<div class="grid2">${keys.map(({k,l,u})=>`
    <div><label>${l}${u?` <span style="opacity:.55">${u}</span>`:''}</label>
    <input type="number" step="0.1" value="${S.d[sec][k]}" placeholder="—" oninput="set('${sec}.${k}',this.value)"></div>
  `).join('')}</div>`;
}

function renderSetup(){
  const d=S.d,ps=S.prevSession;
  const showUpload=parseInt(d.sessionNum)>1;
  return`
  <div class="card">
    <div class="sec-title">Session Details</div>
    <div class="grid2">
      <div><label>Session #</label><input type="number" value="${d.sessionNum}" min="1" oninput="set('sessionNum',this.value)"></div>
      <div><label>Date</label><input type="date" value="${d.date}" oninput="set('date',this.value)"></div>
      <div><label>Athlete Name</label><input type="text" value="${d.athlete}" placeholder="Full name" oninput="set('athlete',this.value)"></div>
      <div><label>Trainer</label><input type="text" value="${d.trainer}" placeholder="Trainer name" oninput="set('trainer',this.value)"></div>
      <div><label>Putter Type</label>
        <select onchange="set('putterType',this.value)">
          ${['Blade','Mallet','Other'].map(o=>`<option${d.putterType===o?' selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div><label>Handed</label>
        <select onchange="set('handed',this.value)">
          ${['Right','Left'].map(o=>`<option${d.handed===o?' selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div><label>Putt Length</label>
        <div style="display:flex;gap:6px">
          <input type="number" value="${d.puttLen}" placeholder="Length" oninput="set('puttLen',this.value)" style="flex:1">
          <select onchange="set('puttUnit',this.value)" style="width:64px">
            <option${d.puttUnit==='ft'?' selected':''}>ft</option>
            <option${d.puttUnit==='m'?' selected':''}>m</option>
          </select>
        </div>
      </div>
      <div><label>Surface</label>
        <select onchange="set('surface',this.value)">
          ${['Indoor','Outdoor'].map(o=>`<option${d.surface===o?' selected':''}>${o}</option>`).join('')}
        </select>
      </div>
      <div><label>Green Type</label>
        <select onchange="set('green',this.value)">
          ${['Artificial','Natural'].map(o=>`<option${d.green===o?' selected':''}>${o}</option>`).join('')}
        </select>
      </div>
    </div>
    <div><label>Session Goal</label><input type="text" value="${d.goal}" placeholder="e.g. Improve tempo consistency" oninput="set('goal',this.value)"></div>
  </div>
  ${showUpload?`
  <div class="card" style="border-color:#ccd7f0">
    <div class="sec-title">Compare with Previous Session</div>
    <p style="font-size:13px;color:#666;margin-bottom:12px">Upload a previous session .json to add comparison columns to the report.</p>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
      <label class="file-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        Upload Session File
        <input type="file" accept=".json" style="display:none;width:auto" onchange="loadPrev(event)">
      </label>
      ${ps
        ?`<span style="font-size:13px;color:#1a7a3b;font-weight:500">✓ Session ${ps.d?.sessionNum||'?'} loaded · ${ps.d?.athlete||''} · ${ps.d?.date||''}</span>`
        :`<span style="font-size:13px;color:#999">No file loaded</span>`}
    </div>
  </div>`:''}`;
}

function renderPutting(sec,title){
  return`<div class="card">
    <div class="sec-title">${title} — 10 Strokes</div>
    ${numGrid(PUT_KEYS,sec)}
  </div>`;
}

function renderMind(){
  return`<div class="card">
    <div class="sec-title">Mind Training — 12 Minutes</div>
    ${numGrid(MIND_KEYS,'mind')}
  </div>`;
}

function renderPostFG(){
  return`${renderPutting('post','Post Putting')}
  <div class="card">
    <div class="sec-title">Performance Training — Focus Golf</div>
    <p style="font-size:12px;color:#888;margin-bottom:14px;margin-top:-8px">Simultaneous with post putting · real-time biofeedback putting trigger</p>
    ${numGrid(FG_KEYS,'fg')}
  </div>`;
}

function renderReport(){
  const d=S.d;
  const ps=S.prevSession?.d||null;
  const hp=!!ps;

  const putHead=hp
    ?`<th class="c">S${ps.sessionNum} Pre</th><th class="c">Pre</th><th class="c">Post</th><th class="c">Pre→Post Δ</th><th class="c">vs S${ps.sessionNum} Δ</th>`
    :`<th class="c">Pre</th><th class="c">Post</th><th class="c">Δ</th>`;
  const cmpHead=hp
    ?`<th class="c">Session ${ps.sessionNum}</th><th class="c">This Session</th><th class="c">Δ</th>`
    :`<th class="c">Value</th>`;

  const pRows=PUT_KEYS.map(({k,l,u},i)=>{
    const bg=i%2?'#fafafa':'#fff';
    const va=d.pre[k],vb=d.post[k];
    let c=`<td style="font-weight:600">${l}</td>`;
    if(hp)c+=`<td class="c" style="color:#999">${ps.pre?.[k]||'—'}${ps.pre?.[k]&&u?u:''}</td>`;
    c+=`<td class="c">${va||'—'}${va&&u?u:''}</td>`;
    c+=`<td class="c">${vb||'—'}${vb&&u?u:''}</td>`;
    c+=dCell(vb,va);
    if(hp)c+=dCell(vb,ps.post?.[k]);
    return`<tr style="background:${bg}">${c}</tr>`;
  }).join('');

  const mRows=MIND_KEYS.map(({k,l,u},i)=>{
    const bg=i%2?'#fafafa':'#fff';
    const v=d.mind[k];
    let c=`<td style="font-weight:600">${l}</td>`;
    if(hp)c+=`<td class="c" style="color:#999">${ps.mind?.[k]||'—'}${ps.mind?.[k]&&u?u:''}</td>`;
    c+=`<td class="c">${v||'—'}${v&&u?u:''}</td>`;
    if(hp)c+=dCell(v,ps.mind?.[k]);
    return`<tr style="background:${bg}">${c}</tr>`;
  }).join('');

  const fRows=FG_KEYS.map(({k,l,u},i)=>{
    const bg=i%2?'#fafafa':'#fff';
    const v=d.fg[k];
    let c=`<td style="font-weight:600">${l}</td>`;
    if(hp)c+=`<td class="c" style="color:#999">${ps.fg?.[k]||'—'}${ps.fg?.[k]&&u?u:''}</td>`;
    c+=`<td class="c">${v||'—'}${v&&u?u:''}</td>`;
    if(hp)c+=dCell(v,ps.fg?.[k]);
    return`<tr style="background:${bg}">${c}</tr>`;
  }).join('');

  return`
  <div class="card" style="border-left:4px solid ${B}">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:12px">
      <div>
        <div style="font-size:22px;font-weight:700;color:#1a1a1a">${d.athlete||'Athlete'}</div>
        <div style="font-size:13px;color:#888;margin-top:2px">Session #${d.sessionNum} · ${d.date} · Trainer: ${d.trainer||'—'}</div>
      </div>
      <div class="meta-chips">
        ${[['Putter',d.putterType],['Handed',d.handed],['Length',d.puttLen?d.puttLen+d.puttUnit:'—'],['Surface',d.surface+'/'+d.green]].map(([l,v])=>
          `<div class="chip"><span class="chip-label">${l}</span><span class="chip-val">${v}</span></div>`).join('')}
      </div>
    </div>
    ${d.goal?`<div style="font-size:13px;color:#666;margin-top:10px">Goal: ${d.goal}</div>`:''}
  </div>

  <div style="font-size:15px;font-weight:600;margin-bottom:10px">Putting Performance</div>
  <div class="tbl-wrap">
    <table><thead><tr><th>Metric</th>${putHead}</tr></thead><tbody>${pRows}</tbody></table>
  </div>

  <div style="font-size:15px;font-weight:600;margin-bottom:10px">Mind Training — 12 Minutes</div>
  <div class="tbl-wrap">
    <table><thead><tr><th>Metric</th>${cmpHead}</tr></thead><tbody>${mRows}</tbody></table>
  </div>

  <div style="font-size:15px;font-weight:600;margin-bottom:4px">Performance Training — Focus Golf</div>
  <div style="font-size:12px;color:#888;margin-bottom:10px">Real-time biofeedback putting trigger · simultaneous with post putting</div>
  <div class="tbl-wrap">
    <table><thead><tr><th>Metric</th>${cmpHead}</tr></thead><tbody>${fRows}</tbody></table>
  </div>

  <div class="summary-box">
    <div style="font-size:11px;font-weight:600;color:${B};text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px">Session Summary</div>
    <textarea rows="6" placeholder="Write your session notes and recommendations here..." oninput="setSt('summary',this.value)">${S.summary}</textarea>

  </div>

  <div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap" class="no-print">
    <button onclick="dlJSON()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="vertical-align:-1px;margin-right:5px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Save Session JSON
    </button>
    <button onclick="window.print()" class="btn-p">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" style="vertical-align:-1px;margin-right:5px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
      Print / Export PDF
    </button>
  </div>`;
}

function render(){
const s=S.step;
let content=’’;
if(s===0)content=renderSetup();
else if(s===1)content=renderPutting(‘pre’,‘Pre Putting’);
else if(s===2)content=renderMind();
else if(s===3)content=renderPostFG();
else content=renderReport();

const nav=s<4
?`<div class="nav ${s>0?'spread':'right'} no-print"> ${s>0?`<button onclick="go(-1)">← Back</button>`:''} <button class="btn-p" onclick="go(1)">${s===3?'Generate Report →':'Next →'}</button> </div>`
:`<div class="nav no-print"><button onclick="go(-4)">← Start New Session</button></div>`;

const progress=`

  <div class="progress no-print">
    ${STEPS.map((name,i)=>`
      <div class="prog-item">
        <div class="prog-bar" style="background:${i<=s?B:'#e0e0e0'}"></div>
        <div class="prog-label" style="color:${i===s?B:'#aaa'}">${name}</div>
      </div>`).join('')}
  </div>`;

document.getElementById(‘app’).innerHTML=progress+content+nav;
}

function go(n){
S.step=n===-4?0:Math.max(0,Math.min(4,S.step+n));
render();
}

function loadPrev(e){
const f=e.target.files[0];if(!f)return;
const r=new FileReader();
r.onload=ev=>{
try{S.prevSession=JSON.parse(ev.target.result);render();}
catch{alert(‘Invalid session file — make sure you're uploading a Thrive session .json’);}
};
r.readAsText(f);
}

function dlJSON(){
const payload={d:S.d,summary:S.summary};
const blob=new Blob([JSON.stringify(payload,null,2)],{type:‘application/json’});
const a=document.createElement(‘a’);
a.href=URL.createObjectURL(blob);
a.download=`thrive_s${S.d.sessionNum}_${(S.d.athlete||'athlete').replace(/\s+/g,'_')}_${S.d.date}.json`;
a.click();
}

render();
</script>

</body>
</html>
